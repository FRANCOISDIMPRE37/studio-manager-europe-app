name: 🚀 Deploy to OVH VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Studio Manager
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔄 Mise à jour du code principal..."
            cd ~/app
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart studio-manager
            echo "✅ Studio Manager mis à jour !"

            echo "🔄 Mise à jour de tous les clients..."
            for dir in /var/www/*/; do
              if [ -f "$dir/package.json" ]; then
                name=$(basename "$dir")
                echo "→ Mise à jour de $name..."
                cd "$dir"
                git pull origin main
                pnpm install --frozen-lockfile
                pnpm build
                pm2 restart "$name" 2>/dev/null || echo "PM2: $name non trouvé"
                echo "✅ $name mis à jour !"
              fi
            done

            echo "🎉 Tous les sites mis à jour !"
            pm2 status
